core:
  - changed-files:
      - any-glob-to-any-file: 'Core/**'
examples:
  - changed-files:
      - any-glob-to-any-file: 'Examples/**'
plugins:
  - changed-files:
      - any-glob-to-any-file: 'Plugins/**'
dependencies:
  - changed-files:
      - any-glob-to-any-file: 'ThirdParty/**'
build system:
  - changed-files:
      - any-glob-to-any-file:
          - '**/CMakeLists.txt'
          - '**/CMakePresets.json'
          - '**/*.cmake'
automation:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - '.github/labeler.yml'
documentation:
  - changed-files:
      - any-glob-to-any-file: '**/*.md'
feature:
  - head-branch: ['feature']
patch:
  - head-branch: ['patch']
refactor:
  - head-branch: ['refactor']
